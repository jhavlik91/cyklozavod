<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Sprint Timer</title>

  <style>
    * { -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
      /* Zabrání náhodnému zoomu/scrollu při rychlém ťukání na trati */
      touch-action: manipulation;
      user-select: none;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .logo img {
      max-width: 100%;
      height: auto;
      max-height: 120px;
    }

    .timer {
      font-size: 56px;
      text-align: center;
      margin: 24px 0;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    button {
      width: 100%;
      padding: 22px;
      font-size: 26px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      margin-bottom: 16px;
      cursor: pointer;
      color: white;
    }

    button:disabled { opacity: 0.6; }

    .start { background: #00c853; }
    .stop1 { background: #ff9100; }
    .stop2 { background: #ff5252; }
    .send  { background: #2962ff; }
    .reset {
      background: none;
      color: #888;
      font-size: 16px;
      padding: 12px;
      margin-top: 4px;
    }

    .result {
      background: #f2f2f2;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 24px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
      box-sizing: border-box;
      color: #111;
    }

    /* Přepínač barvy jízdy (před STARTem) */
    .color-select { display: flex; gap: 12px; margin-bottom: 16px; }
    .color-btn {
      flex: 1;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      border-radius: 12px;
      border: 3px solid transparent;
      cursor: pointer;
      color: #111;
      opacity: 0.55;
    }
    .color-btn.yellow { background: #ffd600; }
    .color-btn.white  { background: #fff; border: 3px solid #bbb; }
    .color-btn.active { opacity: 1; outline: 4px solid #2962ff; outline-offset: 2px; }
    .color-btn.locked { cursor: not-allowed; }

    /* Karty a inputy se obarví podle zvolené barvy jízdy */
    .result.yellow { border-left: 10px solid #ffd600; }
    .result.white  { border-left: 10px solid #bdbdbd; }

    input.bib.yellow {
      background: #fff59d;
      border-color: #fbc02d;
    }
    input.bib.white {
      background: #ffffff;
      border-color: #9e9e9e;
    }
    input.bib::placeholder { color: #777; }

    .hidden { display: none; }

    .time-label {
      font-size: 28px;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }

    .time-label small { color: #888; font-size: 16px; font-weight: normal; }

    #status {
      text-align: center;
      min-height: 22px;
      font-size: 15px;
      color: #b26a00;
      margin-bottom: 8px;
    }

    #status.error {
      color: #fff;
      background: #d32f2f;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: bold;
    }

    .pending {
      background: #e8f5e9;
      border: 1px solid #66bb6a;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #2e7d32;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="logo">
    <img src="logo.png" alt="CoByDup">
  </div>

  <div class="timer" id="timer">00:00.000</div>

  <div id="status"></div>

  <div id="pending" class="pending hidden"></div>

  <div class="color-select" id="colorSelect">
    <button type="button" class="color-btn yellow" data-color="žlutá">ŽLUTÁ</button>
    <button type="button" class="color-btn white"  data-color="bílá">BÍLÁ</button>
  </div>

  <button class="start" id="startBtn">START</button>

  <button class="stop1 hidden" id="stop1Btn">STOP 1</button>
  <button class="stop2 hidden" id="stop2Btn">STOP 2</button>

  <div id="results">

    <div class="result hidden" id="result1">
      <div class="time-label" id="time1Label"></div>
      <input class="bib" type="text" inputmode="numeric" pattern="[0-9]*"
             id="number1" placeholder="Startovní číslo 1. v cíli">
    </div>

    <div class="result hidden" id="result2">
      <div class="time-label" id="time2Label"></div>
      <input class="bib" type="text" inputmode="numeric" pattern="[0-9]*"
             id="number2" placeholder="Startovní číslo 2. v cíli">
    </div>

    <button class="send hidden" id="sendBtn">ODESLAT</button>

  </div>

  <button class="reset hidden" id="resetBtn">↺ Nová jízda (zahodit)</button>

</div>

<script>
  // ----------------------------------------------------------------------
  // KONFIGURACE – vyplň po nasazení Apps Scriptu
  // ----------------------------------------------------------------------
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6BPKn81QrXL55XYTLeWTsx-lGI-pj4NwD2NQQHVyJwZDpZocpHqNmPoWOm3IdPMU4/exec";
  const SHARED_SECRET     = "rUOQe4tV52N0lZEwL7g986sb4U0escic"; // musí sedět s Apps Scriptem; po akci klidně smaž

  const MAX_BIB = 200;            // horní hranice startovního čísla (na barvu)

  // ----------------------------------------------------------------------
  // Stav
  // ----------------------------------------------------------------------
  const timerEl   = document.getElementById("timer");
  const statusEl  = document.getElementById("status");
  const pendingEl = document.getElementById("pending");

  const startBtn = document.getElementById("startBtn");
  const stop1Btn = document.getElementById("stop1Btn");
  const stop2Btn = document.getElementById("stop2Btn");
  const sendBtn  = document.getElementById("sendBtn");
  const resetBtn = document.getElementById("resetBtn");

  const result1El   = document.getElementById("result1");
  const result2El   = document.getElementById("result2");
  const time1Label  = document.getElementById("time1Label");
  const time2Label  = document.getElementById("time2Label");
  const number1El   = document.getElementById("number1");
  const number2El   = document.getElementById("number2");

  const colorSelect = document.getElementById("colorSelect");
  const colorBtns   = Array.from(colorSelect.querySelectorAll(".color-btn"));

  const OUTBOX_KEY = "sprintTimerOutbox";
  const COLOR_KEY  = "sprintTimerColor";

  let startTime = null;
  let interval  = null;
  let stop1 = null;
  let stop2 = null;
  let currentRunId = null;   // stabilní ID jízdy – drží se přes opakované pokusy

  // Barva jízdy – obě čísla v dvojici mají stejnou barvu. Pamatuje poslední volbu.
  let selectedColor = localStorage.getItem(COLOR_KEY) || "žlutá";

  function colorClass(color) { return color === "bílá" ? "white" : "yellow"; }

  function renderColor() {
    const cls = colorClass(selectedColor);
    colorBtns.forEach(b => b.classList.toggle("active", b.dataset.color === selectedColor));
    [result1El, result2El].forEach(el => {
      el.classList.remove("yellow", "white");
      el.classList.add(cls);
    });
    [number1El, number2El].forEach(el => {
      el.classList.remove("yellow", "white");
      el.classList.add(cls);
    });
  }

  colorBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      // Zamčeno jen za běhu měření (START → STOP 2). Před startem i ve fázi
      // výsledků (po dojetí, před odesláním) jde barvu změnit.
      const measuring = startTime !== null && stop2 === null;
      if (measuring) return;
      selectedColor = btn.dataset.color;
      localStorage.setItem(COLOR_KEY, selectedColor);
      renderColor();
    });
  });

  // ----------------------------------------------------------------------
  // Pomocné funkce
  // ----------------------------------------------------------------------
  function formatTime(ms) {
    const minutes = Math.floor(ms / 60000);
    const seconds = Math.floor((ms % 60000) / 1000);
    const millis  = ms % 1000;
    return (
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0") + "." +
      String(millis).padStart(3, "0")
    );
  }

  function setStatus(text, type) {
    statusEl.textContent = text || "";
    statusEl.classList.toggle("error", type === "error");
  }

  // Povolit jen číslice – písmena a znaky se rovnou odstraní
  [number1El, number2El].forEach(el => {
    el.addEventListener("input", () => {
      el.value = el.value.replace(/\D/g, "");
    });
  });

  // Vrátí platné číslo 1..MAX_BIB, nebo null
  function validBib(raw) {
    if (!/^\d+$/.test(raw)) return null;
    const n = parseInt(raw, 10);
    return (n >= 1 && n <= MAX_BIB) ? n : null;
  }

  // ----------------------------------------------------------------------
  // Měření času
  // ----------------------------------------------------------------------
  startBtn.addEventListener("click", () => {
    startTime = Date.now();
    stop1 = null;
    stop2 = null;

    clearInterval(interval);
    interval = setInterval(() => {
      timerEl.textContent = formatTime(Date.now() - startTime);
    }, 31);

    colorBtns.forEach(b => b.classList.add("locked"));  // barva uzamčena pro tuto jízdu
    startBtn.classList.add("hidden");
    stop1Btn.classList.remove("hidden");
    resetBtn.classList.remove("hidden");                // kdykoliv lze zahodit a měřit znovu
  });

  resetBtn.addEventListener("click", () => {
    if (startTime !== null && !confirm("Zahodit rozměřenou jízdu a začít znovu?")) return;
    setStatus("");
    resetApp();
  });

  stop1Btn.addEventListener("click", () => {
    stop1 = Date.now() - startTime;

    // První čas i input ukážeme hned – obsluha může zadávat číslo
    // ještě než dojede druhý závodník.
    time1Label.innerHTML = "1. v cíli &nbsp; " + formatTime(stop1);
    result1El.classList.remove("hidden");

    stop1Btn.classList.add("hidden");
    stop2Btn.classList.remove("hidden");
    // Žádný focus na input – jinak mobil otevře klávesnici a odscrolluje
    // STOP 2 zpod palce. Aktivní necháme samotné STOP tlačítko.
    stop2Btn.focus({ preventScroll: true });
  });

  stop2Btn.addEventListener("click", () => {
    stop2 = Date.now() - startTime;
    clearInterval(interval);
    timerEl.textContent = formatTime(stop2);

    time2Label.innerHTML = "2. v cíli &nbsp; " + formatTime(stop2);
    result2El.classList.remove("hidden");
    sendBtn.classList.remove("hidden");

    // Jedno ID na jízdu – opakované ODESLAT pak server deduplikuje
    currentRunId = "r-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);

    stop2Btn.classList.add("hidden");
    colorBtns.forEach(b => b.classList.remove("locked"));  // barvu lze ještě opravit
    // Oba dojeli → teď je čas zadávat čísla, klávesnice je vítaná
    number1El.focus({ preventScroll: true });
  });

  // ----------------------------------------------------------------------
  // Odeslání – přes outbox (odolné vůči výpadku signálu)
  // ----------------------------------------------------------------------
  sendBtn.addEventListener("click", async () => {
    const number1 = number1El.value.trim();
    const number2 = number2El.value.trim();

    if (!number1 || !number2) {
      setStatus("Vyplň obě startovní čísla.", "error");
      return;
    }
    const bib1 = validBib(number1);
    const bib2 = validBib(number2);
    if (bib1 === null || bib2 === null) {
      setStatus("Číslo musí být 1–" + MAX_BIB + ".", "error");
      return;
    }
    if (bib1 === bib2) {
      setStatus("Startovní čísla nesmí být stejná.", "error");
      return;
    }
    if (stop1 === null || stop2 === null) {
      setStatus("Chybí naměřený čas – změř jízdu znovu.", "error");
      return;
    }

    const payload = {
      rider1: String(bib1),
      rider2: String(bib2),
      color1: selectedColor,      // dvojice je stejnobarevná
      color2: selectedColor,
      time1: formatTime(stop1),
      time2: formatTime(stop2),
      ms1: stop1,                 // surové ms pro řazení v Sheetu
      ms2: stop2,
      clientTs: Date.now(),
      id: currentRunId            // stabilní ID → idempotence i při opakování
    };

    enqueue(payload);

    sendBtn.disabled = true;
    sendBtn.textContent = "Odesílám…";
    setStatus("Odesílám…");

    await flushOutbox();

    // Reset jen když server potvrdil přijetí (položka už není ve frontě)
    const confirmed = !readOutbox().some(it => it.id === payload.id);

    sendBtn.disabled = false;
    sendBtn.textContent = "ODESLAT";

    if (confirmed) {
      setStatus("Odesláno a uloženo ✓");
      resetApp();
    } else {
      setStatus("Odeslání selhalo – časy zůstávají, zkus ODESLAT znovu.", "error");
    }
  });

  function resetApp() {
    clearInterval(interval);
    stop1 = null;
    stop2 = null;
    startTime = null;
    currentRunId = null;

    timerEl.textContent = "00:00.000";
    number1El.value = "";
    number2El.value = "";

    result1El.classList.add("hidden");
    result2El.classList.add("hidden");
    sendBtn.classList.add("hidden");
    stop1Btn.classList.add("hidden");
    stop2Btn.classList.add("hidden");
    resetBtn.classList.add("hidden");
    startBtn.classList.remove("hidden");
    colorBtns.forEach(b => b.classList.remove("locked"));  // barva opět volitelná
  }

  // ----------------------------------------------------------------------
  // Outbox: fronta v localStorage – data nezmizí při výpadku ani refreshi
  // ----------------------------------------------------------------------
  function readOutbox() {
    try { return JSON.parse(localStorage.getItem(OUTBOX_KEY)) || []; }
    catch (e) { return []; }
  }
  function writeOutbox(items) {
    localStorage.setItem(OUTBOX_KEY, JSON.stringify(items));
    renderPending(items.length);
  }
  function enqueue(payload) {
    const items = readOutbox();
    const i = items.findIndex(it => it.id === payload.id);
    if (i >= 0) items[i] = payload;   // stejná jízda → aktualizuj, netvoř duplicitu
    else items.push(payload);
    writeOutbox(items);
  }
  function renderPending(count) {
    if (count > 0) {
      pendingEl.classList.remove("hidden");
      pendingEl.textContent = "Čeká na odeslání: " + count + " jízd(a). Drž appku otevřenou.";
    } else {
      pendingEl.classList.add("hidden");
    }
  }

  // Odešle jednu jízdu a OVĚŘÍ odpověď serveru (status:"OK").
  // text/plain = simple request bez CORS preflightu; Apps Script vrací
  // Access-Control-Allow-Origin:* → odpověď jde přečíst.
  async function postItem(item) {
    const res = await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(Object.assign({}, item, { secret: SHARED_SECRET }))
    });
    const data = await res.json();              // hodí, když odpověď není JSON
    if (data.status !== "OK") {                 // duplicate:true má taky status OK
      const err = new Error(data.error || "server nepotvrdil zápis");
      err.code = data.error;                    // např. "unauthorized"
      throw err;
    }
    return data;
  }

  let flushing = false;
  async function flushOutbox() {
    if (flushing) return;
    flushing = true;
    try {
      let items = readOutbox();
      while (items.length > 0) {
        try {
          await postItem(items[0]);             // čekáme na potvrzení přijetí
        } catch (err) {
          if (err.code === "unauthorized") {
            setStatus("Špatné heslo (SHARED_SECRET) – oprav v index.html / Apps Scriptu.", "error");
          } else {
            setStatus("Bez signálu / server nepotvrdil – zkusím to znovu…", "error");
          }
          break;                                // necháme ve frontě
        }
        items = readOutbox();
        items.shift();                          // smažeme až po potvrzení
        writeOutbox(items);
      }
    } finally {
      flushing = false;
    }
  }

  // Periodický pokus o doručení + při návratu signálu / otevření tabu
  setInterval(flushOutbox, 15000);
  window.addEventListener("online", flushOutbox);

  // Varování při zavření, pokud něco čeká ve frontě
  window.addEventListener("beforeunload", (e) => {
    if (readOutbox().length > 0) { e.preventDefault(); e.returnValue = ""; }
  });

  // Init
  renderColor();
  renderPending(readOutbox().length);
  flushOutbox();
</script>

</body>
</html>
